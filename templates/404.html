{% extends "base.html" %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="mt-5">
            <i class="bi bi-exclamation-triangle" style="font-size: 5rem; color: #ffc107;"></i>
            <h1 class="display-1">404</h1>
            <h2>Страница не найдена</h2>
            <p class="lead">Запрошенная страница не существует или была перемещена.</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                <i class="bi bi-house"></i> Вернуться на главную
            </a>
        </div>
    </div>
</div>
{% endblock %}
